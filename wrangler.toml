name = "prince-qr-manager-backend"
main = "src/index.js"
compatibility_date = "2024-05-01"
compatibility_flags = ["nodejs_compat"]

[vars]
ENVIRONMENT = "production"

# KV caché de redirecciones rápidas
[[kv_namespaces]]
binding = "QR_CACHE"
id = "4a000cd623034898ae4cf2ee1248af8a"

# KV principal — slugs legacy y meta del sistema
[[kv_namespaces]]
binding = "QR_LINKS"
id = "326ce74a62124ba08f68d864f33c79d7"

# Base de datos D1 — usuarios, enlaces, analytics, plan_configs
[[d1_databases]]
binding = "DB"
database_name = "prince-qr-db"
database_id = "90c45dd2-374a-4d09-9bb6-e078214c49d3"
